name: Public Verify Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify-android-build:
    if: github.event.repository.private == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/src/main/assets/app/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK components
        run: yes | sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install frontend dependencies
        working-directory: app/src/main/assets/app
        run: npm ci

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon clean assembleDebug

      - name: Publish debug artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
